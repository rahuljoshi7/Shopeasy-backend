server:
  port: ${PORT:8089}
  servlet:
    context-path: /api

spring:
  application:
    name: shopeasy-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_ISSUER_URI}

supabase:
  url: ${SUPABASE_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    org.springframework.security.oauth2.jwt: TRACE
    org.springframework.security.oauth2.server.resource: TRACE
